<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCI</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #00ffa3;
            --text-color: #f3f4f6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 680px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #fff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #8a8f98;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .viewer-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 16px;
            backdrop-filter: blur(12px);
            position: relative;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 4 / 3;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(-1);
            transition: filter 0.3s ease;
        }

        video.inverted {
            filter: invert(100%) scaleX(-1);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a2d35;
            transition: .3s;
            border-radius: 34px;
            border: 1px solid var(--border-color);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: #0d0e12;
        }

        #error-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13, 14, 18, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            z-index: 10;
            border-radius: 16px;
            display: none;
        }

        .error-content { color: #ff4a6b; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Live View Inverter</h1>
        <p class="subtitle">Real-time camera feed color manipulation via CSS matrix hardware acceleration.</p>

        <div class="viewer-card">
            <div id="error-overlay">
                <div class="error-content" id="error-text"></div>
            </div>
            
            <div class="video-wrapper">
                <video id="webcam" class="inverted" autoplay playsinline muted></video>
            </div>

            <div class="controls">
                <span class="toggle-label">Invert Colors</span>
                <label class="switch">
                    <input type="checkbox" id="effect-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const effectToggle = document.getElementById('effect-toggle');
        const errorOverlay = document.getElementById('error-overlay');
        const errorText = document.getElementById('error-text');

        effectToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                video.classList.add('inverted');
            } else {
                video.classList.remove('inverted');
            }
        });

        async function initCamera() {
            // Fallback Optionen für maximale Kompatibilität
            const constraints = [
                { video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
                { video: true, audio: false } 
            ];

            for (let constraint of constraints) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia(constraint);
                    video.srcObject = stream;
                    return; // Erfolg! Schleife abbrechen.
                } catch (err) {
                    console.log("Versuche Fallback-Konfiguration...", err);
                }
            }

            // Wenn beide Versuche fehlschlagen:
            errorText.innerHTML = "<strong>Camera Access Failed</strong><br>Please ensure you are using HTTPS (GitHub Pages live link) and have granted camera permissions.";
            errorOverlay.style.display = "flex";
        }

        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
